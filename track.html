<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單查詢 — 鬥陣買肉乾</title>
<style>
:root {
  --gold:#C9A84C;--gold-dim:#8A6F35;--black:#0A0A0A;--dark:#111111;
  --dark2:#1A1A1A;--dark3:#262626;--text:#E8E0D0;--text-dim:#998F7E;
  --green:#27AE60;--orange:#E67E22;--blue:#3498DB;
  --font:'Noto Sans TC','PingFang TC',sans-serif;
  --font-d:'Noto Serif TC',serif;
}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--dark);border-bottom:1px solid var(--dark3);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:var(--font-d);font-size:20px;color:var(--gold);text-decoration:none;letter-spacing:.1em;}
.nav-logo span{color:var(--text-dim);font-size:11px;font-weight:300;display:block;letter-spacing:.2em;}
.nav-back{color:var(--text-dim);text-decoration:none;font-size:13px;}
.nav-back:hover{color:var(--gold);}
.wrap{max-width:560px;margin:0 auto;padding:60px 20px;flex:1;}
.title{font-family:var(--font-d);font-size:28px;color:var(--gold);text-align:center;margin-bottom:8px;}
.sub{font-size:14px;color:var(--text-dim);text-align:center;margin-bottom:40px;}
.panel{background:var(--dark2);padding:32px;border:1px solid var(--dark3);}
.field{margin-bottom:16px;}
.field label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px;letter-spacing:.06em;}
.field input{width:100%;background:var(--dark3);border:1px solid var(--dark3);color:var(--text);padding:12px 14px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.search-btn{width:100%;padding:14px;background:var(--gold);color:var(--black);border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);margin-top:8px;transition:background .2s;}
.search-btn:hover{background:#E8C96A;}
.search-btn:disabled{opacity:.6;cursor:default;}
.result{margin-top:24px;display:none;}
.result-title{font-family:var(--font-d);font-size:18px;color:var(--gold);margin-bottom:20px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--dark3);font-size:14px;gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--text-dim);white-space:nowrap;}
.info-val{text-align:right;}
.badge{display:inline-block;padding:3px 10px;font-size:11px;}
.b-pending{background:rgba(230,126,34,.15);color:var(--orange);}
.b-paid{background:rgba(39,174,96,.15);color:var(--green);}
.b-shipping{background:rgba(52,152,219,.15);color:var(--blue);}
.b-done{background:rgba(201,168,76,.15);color:var(--gold);}
.not-found{text-align:center;padding:32px;color:var(--text-dim);display:none;line-height:2;}
/* 聯絡區塊 */
.contact-strip{margin-top:32px;background:var(--dark2);border:1px solid var(--dark3);padding:24px 32px;}
.contact-strip .c-title{font-size:12px;color:var(--text-dim);letter-spacing:.1em;margin-bottom:16px;text-align:center;}
.contact-links{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;}
.c-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;font-family:var(--font);text-decoration:none;border:1px solid var(--dark3);color:var(--text-dim);transition:all .2s;}
.c-btn:hover{border-color:var(--gold);color:var(--gold);}
.c-btn svg{flex-shrink:0;}
.c-line img{vertical-align:middle;}
/* footer */
footer{background:var(--dark);border-top:1px solid var(--dark3);padding:20px 40px;text-align:center;font-size:12px;color:var(--text-dim);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">鬥陣買<span>I BUY. YOU BUY. WE BUY.</span></a>
  <a href="index.html" class="nav-back">← 回首頁</a>
</nav>

<div class="wrap">
  <div class="title">訂單查詢</div>
  <p class="sub">輸入訂單編號與手機後四碼，即可查詢訂單狀態</p>

  <div class="panel">
    <div class="field">
      <label>訂單編號</label>
      <input type="text" id="trackId" placeholder="例如：DZM1782189893176" onkeydown="if(event.key==='Enter')doTrack()">
    </div>
    <div class="field">
      <label>手機後四碼</label>
      <input type="text" id="trackPhone" maxlength="4" placeholder="例如：5678" onkeydown="if(event.key==='Enter')doTrack()">
    </div>
    <button class="search-btn" id="searchBtn" onclick="doTrack()">查詢訂單</button>

    <div class="result" id="result">
      <div class="result-title">訂單資訊</div>
      <div id="resultContent"></div>
    </div>
    <div class="not-found" id="notFound"></div>
  </div>

  <!-- 聯絡我們 -->

</div>

<footer>© 鬥陣買肉乾 · 手工製作，用心送達</footer>

<script>
const ADMIN_API = 'https://script.google.com/macros/s/AKfycbzwY8SxFQ9A-89Srb6v7Tn3-hUN2u9IScUMTGAtw03czpNtBnwxTc9b6WGpm94hU32ULA/exec';

const statusMap = {
  '待付款':'<span class="badge b-pending">待付款</span>',
  '查帳中':'<span class="badge b-pending">查帳中 🔍</span>',
  '已付款':'<span class="badge b-paid">已付款</span>',
  '待出貨':'<span class="badge b-pending">待出貨</span>',
  '已出貨':'<span class="badge b-shipping">已出貨 🚚</span>',
  '已完成':'<span class="badge b-done">已完成 ✓</span>',
};

// 把 row 的 key/value 都 trim，處理試算表欄位名稱有空格的問題
function normalizeRow(row) {
  const out = {};
  for (const k of Object.keys(row)) {
    out[k.trim()] = typeof row[k] === 'string' ? row[k].trim() : row[k];
  }
  return out;
}

function getField(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== '') return row[k];
  }
  return '';
}

async function doTrack() {
  const id = document.getElementById('trackId').value.trim().toUpperCase();
  const phone4 = document.getElementById('trackPhone').value.trim();

  document.getElementById('result').style.display = 'none';
  document.getElementById('notFound').style.display = 'none';

  if (!id || !phone4) { showNotFound('請填寫訂單編號與手機後四碼'); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '查詢中…';

  try {
    const res = await fetch(ADMIN_API);
    const data = await res.json();
    btn.disabled = false;
    btn.textContent = '查詢訂單';

    if (!Array.isArray(data) || data.length === 0) {
      showNotFound('系統暫時無法查詢，請稍後再試');
      return;
    }

    // 把所有欄位 key/value trim（處理試算表欄位有空格的問題）
    const normalized = data.map(normalizeRow);
    console.log('=== 正規化後欄位名稱 ===', Object.keys(normalized[0]));

    const row = normalized.find(r => {
      // 嘗試多種可能的欄位名稱
      const rowId = getField(r,
        '訂單編號','Order ID','order_id','orderId','訂單號碼'
      ).trim().toUpperCase();

      const rowPhone = String(getField(r,
        '電話','手機','手機號碼','Phone','phone','聯絡電話','電話號碼'
      )).trim();

      console.log(`比對：rowId="${rowId}" vs id="${id}" | rowPhone="${rowPhone}" slice(-4)="${rowPhone.slice(-4)}" vs phone4="${phone4}"`);
      return rowId === id && rowPhone.slice(-4) === phone4;
    });

    if (!row) {
      // 找不到時顯示實際欄位名稱（協助除錯）
      console.warn('找不到訂單。正規化後欄位：', Object.keys(normalized[0]));
      showNotFound();
      return;
    }

    const payStatus  = getField(row, '付款狀態','Payment Status') || '查帳中';
    const shipStatus = getField(row, '出貨狀態','Shipping Status') || '待出貨';
    const shipping   = getField(row, '商品方式','配送方式','Shipping','出貨方式');
    const deliveryInfo = getField(row, '取貨門市／地址','取貨門市/地址','取貨地址','配送地址');
    const transfer5  = getField(row, '轉帳後五碼','後五碼','匯款後五碼');
    const transferTime = getField(row, '轉帳時間','匯款時間');
    const rawTime    = getField(row, '時間戳記','下單時間','Timestamp','建立時間');
    const time = rawTime ? (() => {
      try {
        const d = new Date(rawTime);
        return d.toLocaleString('zh-TW', {timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\//g,'/');
      } catch(e) { return rawTime; }
    })() : '';
    const itemsText  = getField(row, '商品明細','商品','Items','訂購商品');
    const total      = getField(row, '總金額','Total','合計','訂單金額');

    document.getElementById('resultContent').innerHTML = `
      <div class="info-row"><span class="info-label">訂單編號</span><span class="info-val" style="color:var(--gold-dim);font-size:12px">${getField(row,'訂單編號','Order ID')}</span></div>
      <div class="info-row"><span class="info-label">下單時間</span><span class="info-val">${time}</span></div>
      <div class="info-row"><span class="info-label">訂購商品</span><span class="info-val">${itemsText.replace(/x(\d)/g,'×$1')}</span></div>
      <div class="info-row"><span class="info-label">訂單金額</span><span class="info-val" style="color:var(--gold)">NT$ ${total}</span></div>
      ${shipping ? `<div class="info-row"><span class="info-label">配送方式</span><span class="info-val">${shipping}</span></div>` : ''}
      ${transfer5 ? `<div class="info-row"><span class="info-label">轉帳後五碼</span><span class="info-val">${transfer5}</span></div>` : ''}
      ${transferTime ? `<div class="info-row"><span class="info-label">轉帳時間</span><span class="info-val">${transferTime}</span></div>` : ''}
      <div class="info-row"><span class="info-label">付款狀態</span><span class="info-val">${statusMap[payStatus]||payStatus}</span></div>
      <div class="info-row"><span class="info-label">出貨狀態</span><span class="info-val">${statusMap[shipStatus]||shipStatus}</span></div>
      <div style="margin-top:16px;padding:16px;background:var(--dark3);font-size:13px;color:var(--text-dim);line-height:2;text-align:center;">
        有問題嗎？來 LINE 找我們最快！<br>
        <a href="https://lin.ee/wvbqdo7" target="_blank" rel="noopener"
           style="display:inline-block;margin-top:8px;">
          <img src="https://scdn.line-apps.com/n/line_add_friends/btn/zh-Hant.png" alt="加入好友" height="36" border="0">
        </a>
      </div>`;
    document.getElementById('result').style.display = 'block';

  } catch(e) {
    btn.disabled = false;
    btn.textContent = '查詢訂單';
    console.error('查詢錯誤:', e);
    showNotFound('網路錯誤，請稍後再試');
  }
}

function showNotFound(msg) {
  const el = document.getElementById('notFound');
  el.innerHTML = msg
    ? `${msg}<br><span style="font-size:12px;margin-top:8px;display:block">如有疑問請聯絡 0925-536966</span>`
    : `找不到符合的訂單<br><span style="font-size:12px">請確認訂單編號與手機號碼是否正確</span><br><span style="font-size:12px;margin-top:8px;display:block">如有疑問請聯絡 0925-536966</span>`;
  el.style.display = 'block';
}
</script>
</body>
</html>
