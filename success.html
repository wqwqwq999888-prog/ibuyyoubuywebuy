<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款成功 | 鬥陣買肉乾</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #f0e6d3;
      font-family: 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; color: #c9a96e; margin-bottom: 12px; }
    p { color: #999; font-size: 14px; line-height: 1.8; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 32px;
      background: #c9a96e;
      color: #1a1a1a;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>付款成功！</h1>
    <p>感謝您的訂購，我們已收到您的付款。</p>
    <p>訂單確認信將寄送至您的信箱，請留意查收。</p>
    <p>備貨完成後將盡速為您出貨！</p>
    <a href="index.html" class="btn">繼續購物</a>
  </div>
</body>
</html>
